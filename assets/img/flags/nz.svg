<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 60 40" role="img" aria-label="New Zealand">
  <defs>
    <polygon id="s" points="0,-1 0.2245,-0.309 0.9511,-0.309 0.3633,0.118 0.5878,0.809 0,0.382 -0.5878,0.809 -0.3633,0.118 -0.9511,-0.309 -0.2245,-0.309"/>
    <clipPath id="cant"><rect width="30" height="20"/></clipPath>
  </defs>
  <rect width="60" height="40" fill="#00247D"/>
  <!-- Union Jack in canton -->
  <g clip-path="url(#cant)">
    <g stroke="#ffffff" stroke-width="4"><line x1="0" y1="0" x2="30" y2="20"/><line x1="30" y1="0" x2="0" y2="20"/></g>
    <g stroke="#CC142B" stroke-width="1.4"><line x1="0" y1="0" x2="30" y2="20"/><line x1="30" y1="0" x2="0" y2="20"/></g>
    <g stroke="#ffffff" stroke-width="6"><line x1="15" y1="0" x2="15" y2="20"/><line x1="0" y1="10" x2="30" y2="10"/></g>
    <g stroke="#CC142B" stroke-width="3.2"><line x1="15" y1="0" x2="15" y2="20"/><line x1="0" y1="10" x2="30" y2="10"/></g>
  </g>
  <!-- Southern Cross: white fimbriation behind red stars -->
  <g fill="#ffffff">
    <use xlink:href="#s" transform="translate(46,9)  scale(3.4)"/>
    <use xlink:href="#s" transform="translate(53,18) scale(2.7)"/>
    <use xlink:href="#s" transform="translate(39,20) scale(3.4)"/>
    <use xlink:href="#s" transform="translate(46,33) scale(3.9)"/>
  </g>
  <g fill="#CC142B">
    <use xlink:href="#s" transform="translate(46,9)  scale(2.6)"/>
    <use xlink:href="#s" transform="translate(53,18) scale(2.0)"/>
    <use xlink:href="#s" transform="translate(39,20) scale(2.6)"/>
    <use xlink:href="#s" transform="translate(46,33) scale(3.0)"/>
  </g>
</svg>
